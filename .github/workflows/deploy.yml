# Deploy to Raspberry Pi when code is pushed to main.
# Requires: Pi reachable via SSH from the internet (e.g. Tailscale, or port 22 forwarded + dynamic DNS).
# Repo secrets: DEPLOY_HOST, DEPLOY_USER, DEPLOY_SSH_KEY (private key for SSH auth).

name: Deploy to Pi

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          command_timeout: 5m
          script: |
            cd ~/SlashGather-Discord-Bot
            bash scripts/pull-and-restart.sh
